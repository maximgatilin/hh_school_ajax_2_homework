<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Drag'n'Drop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Drag'n'Drop</h1>
    <div class="source-area" id="sourceArea">
        <p>Зона-источник</p>
        <p>Нажми и тяни</p>
    </div>
    <div class="bottom-area">
        <div class="grid-area">
            <p class="zone-title">Сетка</p>
            <div class="grid" id="grid"></div>
        </div>
        <div class="free-area">
            <p class="zone-title">Свободное размещение</p>
            <div class="free" id="free"></div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
