    <title>Drag & Drop</title>
    <link rel="stylesheet" href="css/style.css" />

  <body>
    <main class="page">
      <section class="panel source-panel">
        <h3>Отсюда берём</h3>

          <h3>Сюда кладём (неровно и не по порядку)</h3>
          <div id="free" class="zone free"></div>

      </section>
